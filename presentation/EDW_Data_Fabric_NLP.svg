    <text x="600" y="615" text-anchor="middle" font-size="13" font-weight="700" fill="#4C9E45">Why this beats our local POC</text>
    <text x="80" y="640" font-size="11" fill="#444">•  <tspan font-weight="700">Grounded, not guessing.</tspan>  Agent reads the Platinum semantic model — measures, relationships, business glossary — so it uses the same definitions as reports.</text>
    <text x="80" y="660" font-size="11" fill="#444">•  <tspan font-weight="700">Security inherited.</tspan>  Row-level and object-level security from Platinum flow through automatically. Users only see data they are already allowed to see.</text>
    <text x="80" y="680" font-size="11" fill="#444">•  <tspan font-weight="700">No infrastructure.</tspan>  No Ollama, no GPUs, no VRAM pressure, no prompt engineering. Azure OpenAI runs at cloud scale; latency measured in seconds, not minutes.</text>
